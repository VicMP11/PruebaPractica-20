<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Práctica</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="tarjeta">
        <div class="top">
            <div class="logo">R</div>
            <div>
                <h1>Crear cuenta</h1>
                <p>Accede a todos los recursos del curso</p>
            </div>
        </div>
        <div class="cuerpo">
            <label class="label">Nombre completo</label>
            <input type="text" class="input" placeholder="Ej. Ana García López">

            <label class="label">Correo electrónico</label>
            <input type="email" class="input" placeholder="nombre@ejemplo.com">
        </div>
        <div class="datos">
            <label class="label">Contraseña</label>
            <input type="password" class="contraseña" placeholder="********">

            <label class="label">Confirmar</label>
            <input type="password" class="contraseña" placeholder="********">
        </div>
        <div class="niveles">
            <button class="nivelRojo">Principiante</button>
            <button class="nivel">Intermedio</button>
            <button class="nivel">Avanzado</button>
        </div>
        <hr>
        <button class="btn">Crear mi cuenta -></button>
    </div>
    <footer>
        <p>¿Ya tienes cuenta?</p>
        <a href="#">Inicia sesión aquí</a>
    </footer>
</body>
</html>
